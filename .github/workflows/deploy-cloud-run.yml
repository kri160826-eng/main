# path to save: .github/workflows/deploy-cloud-run.yml
name: Deploy Cloud Run Apps workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      app_name:
        description: "Optional: deploy only one app_name from apps.json"
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - id: matrix
        shell: bash
        env:
          CURRENT_BRANCH: ${{ github.ref_name }}
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          python - <<EOF >> "$GITHUB_OUTPUT"
          import json, os

          with open(".github/deploy/apps.json") as f:
              config = json.load(f)

          branch = os.environ["CURRENT_BRANCH"]
          app_name = os.environ.get("APP_NAME", "")

          apps = []
          for app in config["apps"]:
              if app["branch"] != branch:
                  continue
              if app_name and app["app_name"] != app_name:
                  continue
              apps.append(app)

          print("matrix=" + json.dumps({"include": apps}))
          EOF

  deploy:
    needs: prepare
    if: ${{ needs.prepare.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/452226309078/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python for ADK
        if: ${{ matrix.deploy_type == 'adk_agent' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ADK CLI
        if: ${{ matrix.deploy_type == 'adk_agent' }}
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install google-adk
          adk --help

      - name: Build env vars
        shell: bash
        run: |
          if [ '${{ toJson(matrix.env_vars) }}' = 'null' ]; then
            echo "ENV_VARS=" >> "$GITHUB_ENV"
          else
            python - <<EOF >> "$GITHUB_ENV"
          import json
          envs = json.loads(r'''${{ toJson(matrix.env_vars) }}''')
          print("ENV_VARS=" + ",".join([f"{k}={v}" for k, v in envs.items()]))
          EOF
          fi

      - name: Deploy ADK agent to Cloud Run
        if: ${{ matrix.deploy_type == 'adk_agent' }}
        shell: bash
        run: |
          AUTH_INPUT="n"
          if [ "${{ matrix.allow_unauthenticated }}" = "true" ]; then
            AUTH_INPUT="y"
          fi

          CMD="adk deploy cloud_run \
            --project='${{ matrix.project_id }}' \
            --region='${{ matrix.region }}' \
            --service_name='${{ matrix.service_name }}'"

          if [ "${{ matrix.with_ui }}" = "true" ]; then
            CMD="$CMD --with_ui"
          fi

          if [ -n "$ENV_VARS" ]; then
            CMD="$CMD --set-env-vars='$ENV_VARS'"
          fi

          CMD="$CMD '${{ matrix.path }}' -- --clear-base-image"

          echo "$CMD"
          printf "%s\n" "$AUTH_INPUT" | eval "$CMD"

      - name: Deploy other apps to Cloud Run
        if: ${{ matrix.deploy_type == 'other_apps' }}
        shell: bash
        run: |
          AUTH_FLAG="--no-allow-unauthenticated"
          if [ "${{ matrix.allow_unauthenticated }}" = "true" ]; then
            AUTH_FLAG="--allow-unauthenticated"
          fi

          CMD="gcloud run deploy '${{ matrix.service_name }}' \
            --source '${{ matrix.path }}' \
            --project '${{ matrix.project_id }}' \
            --region '${{ matrix.region }}' \
            --platform managed \
            $AUTH_FLAG \
            --quiet"

          if [ -n "$ENV_VARS" ]; then
            CMD="$CMD --set-env-vars='$ENV_VARS'"
          fi

          echo "$CMD"
          eval "$CMD"
