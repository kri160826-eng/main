# path to save : .github/workflows/deploy-cloud-run.yml

name: Deploy Cloud Run Apps

on:
  push:
    branches:
      - main
      - streamlit
      - dev
      - qa
  workflow_dispatch:
    inputs:
      app_name:
        description: "Optional: deploy only one app name from apps.json"
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - id: matrix
        shell: bash
        run: |
          CURRENT_BRANCH="${GITHUB_REF_NAME}"
          APP_NAME="${{ github.event.inputs.app_name }}"

          python - <<EOF >> "$GITHUB_OUTPUT"
          import json, os

          with open(".github/deploy/apps.json") as f:
              config = json.load(f)

          branch = os.environ["CURRENT_BRANCH"]
          app_name = os.environ.get("APP_NAME", "")

          apps = []
          for app in config["apps"]:
              if app["branch"] != branch:
                  continue
              if app_name and app["name"] != app_name:
                  continue
              apps.append(app)

          print("matrix=" + json.dumps({"include": apps}))
          EOF

  deploy:
    needs: prepare
    if: ${{ needs.prepare.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker ${{ matrix.region }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ matrix.region }}-docker.pkg.dev/${{ matrix.project_id }}/${{ matrix.artifact_repo }}/${{ matrix.app_name }}:${{ github.sha }}"
          docker build -t "$IMAGE" "${{ matrix.path }}"
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
		  
      - name: Deploy to Cloud Run
        run: |
          AUTH_FLAG=""
          if [ "${{ matrix.allow_unauthenticated }}" = "true" ]; then
            AUTH_FLAG="--allow-unauthenticated"
          else
            AUTH_FLAG="--no-allow-unauthenticated"
          fi

          gcloud run deploy "${{ matrix.service_name }}" \
            --image "$IMAGE" \
            --project "${{ matrix.project_id }}" \
            --region "${{ matrix.region }}" \
            --platform managed \
            $AUTH_FLAG
			